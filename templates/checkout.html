<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Підтвердження замовлення</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <h1>Дякуємо за ваше замовлення, {{ name }}!</h1>
    </header>

    <main>
        <div class="order-details">
            <p>Адреса доставки: {{ address }}</p>
            <p>Телефон: {{ phone }}</p>

            <h3>Ваші товари:</h3>
            <ul class="cart-list">
                {% for item in cart %}
                <li class="cart-item">
                    <span>{{ item.name }}</span>
                    <span>{{ item.price }} грн</span>
                </li>
                {% endfor %}
            </ul>
        </div>

        <a href="{{ url_for('index') }}" class="btn">Повернутися до каталогу</a>
    </main>

    <footer>
        <p>© 2024 Інтернет-Магазин</p>
    </footer>
</body>
</html>
