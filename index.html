<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Інтернет-Магазин</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <h1>Каталог товарів</h1>
        <nav>
            <a href="{{ url_for('cart') }}" class="cart-link">🛒 Переглянути кошик</a>
        </nav>
    </header>

    <main>
        <section class="product-list">
            {% for product in products %}
            <div class="product-card">
                <div class="product-info">
                    <h3>{{ product.name }}</h3>
                    <p>Ціна: <span class="price">{{ product.price }} грн</span></p>
                </div>
                <form action="{{ url_for('add_to_cart', product_id=product.id) }}" method="GET">
                    <button type="submit" class="btn">Додати в кошик</button>
                </form>
            </div>
            {% endfor %}
        </section>
    </main>

    <footer>
        <p>© 2024 Інтернет-Магазин</p>
    </footer>
</body>
</html>
